- name: app setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml  

- name: install nodejs 
  ansible.builtin.import_role:
    name: common
    tasks_from: nodejs.yaml

- name: copy mongo.repo file
  ansible.builtin.copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo

- name: install mongodb client
  ansible.builtin.dnf:
    name: mongodb-mongosh
    state: present

- name: check database table exiest or not
  ansible.builtin.command: mongosh --host {{MONGODB_HOST}} --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
  register: catalouge_output

- name: load database 
  ansible.builtin.shell: mongosh --host {{MONGODB_HOST}} </app/db/master-data.js
  when: catalouge_output.stdout | int < 0

- name: systemd 
  ansible.builtin.import_role:
    name: common
    tasks_from: systemd.yaml