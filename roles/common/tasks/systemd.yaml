- name: copy {{service_name}} service files
  ansible.builtin.template:
    src: "{{service_name}}.service.j2"
    dest: /etc/systemd/system/{{service_name}}.service
  notify: deamon reload

- name: deamon reload and start {{service_name}}
  ansible.builtin.service:
    name: "{{service_name}}"
    enabled: true
    state: restarted
  